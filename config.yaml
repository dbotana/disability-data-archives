# =============================================================================
# Federal Disability Data Monitor — Configuration
# =============================================================================
# All secrets should be set via environment variables; never hardcode them here.
# Environment variable references use ${VAR_NAME} syntax (loaded via python-dotenv).
#
# DISCLAIMER: This is a non-partisan public interest research tool. It records
# factual changes to publicly available federal data. It does not advocate for
# or against any political position.
# =============================================================================

system:
  db_path: "data/monitoring.db"
  archive_dir: "archive"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/monitor.log"
  timezone: "America/New_York"
  max_archive_age_days: 365  # Prune raw HTML older than this

  # ---------------------------------------------------------------------------
  # Storage backend
  # ---------------------------------------------------------------------------
  # "github"  — Results committed as CSV files to the GitHub repo.
  #             Requires GITHUB_TOKEN env var. Used by GitHub Actions and
  #             `docker compose run --rm monitor`.
  # "local"   — Results written to data/ on the local filesystem only
  #             (no GitHub commit). Useful for offline testing / dry-runs.
  storage_backend: "github"   # github | local

  # GitHub repository that stores the data files.
  # Override with GITHUB_REPOSITORY env var (set automatically by Actions).
  # Format: "owner/repo"  e.g. "jsmith/disability-data-archives"
  github_repo: "${GITHUB_REPOSITORY}"

  # Branch to read from and commit to.
  github_branch: "${GITHUB_REF_NAME:-main}"

  # Paths inside the repo for the two data files.
  data_changes_path: "data/changes.csv"
  data_snapshots_path: "data/snapshots.csv"
  data_summary_path: "data/run_summary.md"

crawling:
  min_delay_seconds: 2.0          # Minimum delay between requests to the same domain
  max_concurrent_requests: 5      # Global semaphore limit across all fetches
  request_timeout_seconds: 30     # Per-request timeout
  max_retries: 3                  # Tenacity retry attempts on transient errors
  retry_backoff_multiplier: 2.0   # Exponential backoff: 4s, 8s, 16s
  user_agents:
    - "FederalDataMonitor/1.0 (Public Interest Research; contact: research@example.org)"
    - "DisabilityDataArchive/1.0 (Academic; +https://github.com/example/disability-data-archives)"
    - "Mozilla/5.0 (compatible; DataMonitorBot/1.0; +https://github.com/example/disability-data-archives)"

scheduling:
  high_frequency_interval_hours: 6     # SSA, Regulations.gov, SODA APIs
  medium_frequency_interval_hours: 24  # HTML pages, dataset indexes
  low_frequency_interval_days: 7       # Deep diffs, Wayback comparisons
  daily_digest_hour: 8                 # Hour (24h) to send daily digest email
  daily_digest_minute: 0

alerts:
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    use_tls: true
    smtp_user: "${EMAIL_USER}"
    smtp_password: "${EMAIL_PASSWORD}"
    from_address: "monitor@example.org"
    to_addresses:
      - "alerts@example.org"
    min_severity: "HIGH"   # CRITICAL | HIGH | MEDIUM | LOW

  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#disability-data-alerts"
    min_severity: "HIGH"

  rss:
    enabled: true
    output_path: "data/feed.xml"
    feed_title: "Federal Disability Data Monitor"
    feed_description: "Automated monitoring of federal disability datasets for changes and removals"
    feed_link: "http://localhost:8000"
    max_items: 200

wayback:
  enabled: true
  save_api_base: "https://web.archive.org/save"
  cdx_api_base: "http://web.archive.org/cdx/search/cdx"
  availability_api: "https://archive.org/wayback/available"
  access_key: "${WAYBACK_ACCESS_KEY}"     # Optional: S3-like keys for higher rate limits
  secret_key: "${WAYBACK_SECRET_KEY}"
  submit_on_critical: true               # Auto-submit CRITICAL changes to Wayback
  submit_rate_limit_per_minute: 10       # Wayback Save API rate limit
  verify_after_hours: 24                 # Re-check CDX after this many hours

nlp:
  embedding_model: "all-MiniLM-L6-v2"          # ~80MB, fast, good quality
  zero_shot_model: "facebook/bart-large-mnli"  # ~1.6GB — disable if RAM-constrained
  zero_shot_enabled: false                      # Set true only if you have 4GB+ free RAM
  device: "cpu"                                 # "cuda" if GPU available
  cache_dir: "models/"
  batch_size: 8
  disability_keywords:
    - "disability"
    - "disabilities"
    - "disabled"
    - "ADA"
    - "Americans with Disabilities Act"
    - "Section 504"
    - "Section 508"
    - "Rehabilitation Act"
    - "SSDI"
    - "SSI"
    - "Social Security Disability"
    - "IDEA"
    - "Individuals with Disabilities Education"
    - "accommodation"
    - "reasonable accommodation"
    - "accessibility"
    - "assistive technology"
    - "wheelchair"
    - "blind"
    - "deaf"
    - "autism"
    - "intellectual disability"
    - "developmental disability"
    - "mental health"
    - "psychiatric"
    - "cognitive impairment"
    - "long COVID"
    - "chronic condition"
    - "vocational rehabilitation"
    - "independent living"
    - "community integration"
    - "Olmstead"
    - "neurodivergent"
    - "NCBDDD"
    - "NIDILRR"
    - "ACL"
    - "ADRC"
    - "special education"
    - "IEP"
    - "Section 503"
    - "undue hardship"
  zero_shot_candidate_labels:
    - "dataset deletion"
    - "policy change"
    - "data update"
    - "website restructure"
    - "access restriction"
    - "new publication"
    - "funding change"
    - "regulatory update"
    - "program elimination"
    - "content restoration"

dashboard:
  host: "0.0.0.0"
  port: 8000
  auth_username: "${DASHBOARD_USER}"
  auth_password: "${DASHBOARD_PASSWORD}"
  page_size: 50
  max_diff_display_bytes: 50000
  debug: false

